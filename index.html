<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Classic Snake</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --text: #f2f4f8;
      --muted: #a6adbb;
      --accent: #38d46d;
      --danger: #ff5f56;
      --grid: #1f2430;
      --snake: #38d46d;
      --food: #ff5f56;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, #1a2030 0%, var(--bg) 55%);
      padding: 16px;
    }

    .game-wrap {
      width: min(90vw, 520px);
      background: linear-gradient(180deg, #1b1f2a 0%, #131722 100%);
      border: 1px solid #2a3040;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
    }

    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .score strong {
      color: var(--accent);
      margin-left: 6px;
    }

    .status {
      color: var(--muted);
    }

    canvas {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: var(--panel);
      border: 1px solid #2a3040;
      border-radius: 10px;
      display: block;
    }

    .controls {
      margin-top: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      font-size: 13px;
      color: var(--muted);
    }

    button {
      border: 0;
      background: #2a3142;
      color: var(--text);
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      background: #36405a;
    }

    .game-over {
      color: var(--danger);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="game-wrap">
    <div class="hud">
      <div class="score">Score:<strong id="score">0</strong></div>
      <div id="status" class="status">Press any arrow key to start</div>
    </div>
    <canvas id="board" width="400" height="400" aria-label="Snake game board"></canvas>
    <div class="controls">
      <span>Move: Arrow Keys / WASD</span>
      <button id="restartBtn" type="button">Restart</button>
    </div>
  </main>

  <script>
    const canvas = document.getElementById("board");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const statusEl = document.getElementById("status");
    const restartBtn = document.getElementById("restartBtn");

    const gridSize = 20;
    const tileCount = canvas.width / gridSize;
    const speedMs = 120;

    let snake;
    let direction;
    let queuedDirection;
    let food;
    let score;
    let gameOver;
    let started;

    function resetGame() {
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ];
      direction = { x: 1, y: 0 };
      queuedDirection = direction;
      food = randomFoodPosition();
      score = 0;
      gameOver = false;
      started = false;
      scoreEl.textContent = score;
      statusEl.textContent = "Press any arrow key to start";
      statusEl.classList.remove("game-over");
      draw();
    }

    function randomFoodPosition() {
      let pos;
      do {
        pos = {
          x: Math.floor(Math.random() * tileCount),
          y: Math.floor(Math.random() * tileCount)
        };
      } while (snake.some(segment => segment.x === pos.x && segment.y === pos.y));
      return pos;
    }

    function drawGrid() {
      ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue("--grid").trim();
      ctx.lineWidth = 1;
      for (let i = 0; i <= tileCount; i++) {
        const p = i * gridSize;
        ctx.beginPath();
        ctx.moveTo(p, 0);
        ctx.lineTo(p, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, p);
        ctx.lineTo(canvas.width, p);
        ctx.stroke();
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawGrid();

      ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue("--food").trim();
      ctx.fillRect(food.x * gridSize + 2, food.y * gridSize + 2, gridSize - 4, gridSize - 4);

      ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue("--snake").trim();
      snake.forEach((segment, i) => {
        ctx.fillRect(segment.x * gridSize + 1, segment.y * gridSize + 1, gridSize - 2, gridSize - 2);
        if (i === 0) {
          ctx.fillStyle = "#8ef0ad";
          ctx.fillRect(segment.x * gridSize + 5, segment.y * gridSize + 5, gridSize - 10, gridSize - 10);
          ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue("--snake").trim();
        }
      });
    }

    function tick() {
      if (!started || gameOver) return;

      direction = queuedDirection;
      const head = snake[0];
      const nextHead = {
        x: head.x + direction.x,
        y: head.y + direction.y
      };

      const hitWall =
        nextHead.x < 0 ||
        nextHead.x >= tileCount ||
        nextHead.y < 0 ||
        nextHead.y >= tileCount;

      const hitSelf = snake.some(segment => segment.x === nextHead.x && segment.y === nextHead.y);

      if (hitWall || hitSelf) {
        gameOver = true;
        statusEl.textContent = "Game Over";
        statusEl.classList.add("game-over");
        return;
      }

      snake.unshift(nextHead);

      if (nextHead.x === food.x && nextHead.y === food.y) {
        score += 1;
        scoreEl.textContent = score;
        food = randomFoodPosition();
      } else {
        snake.pop();
      }

      statusEl.textContent = "Playing";
      draw();
    }

    function setDirection(next) {
      if (!started) started = true;
      if (gameOver) return;

      const isOpposite = next.x === -direction.x && next.y === -direction.y;
      if (!isOpposite) queuedDirection = next;
    }

    window.addEventListener("keydown", event => {
      const key = event.key.toLowerCase();
      if (key === "arrowup" || key === "w") setDirection({ x: 0, y: -1 });
      if (key === "arrowdown" || key === "s") setDirection({ x: 0, y: 1 });
      if (key === "arrowleft" || key === "a") setDirection({ x: -1, y: 0 });
      if (key === "arrowright" || key === "d") setDirection({ x: 1, y: 0 });
      if (key === " " && gameOver) resetGame();
    });

    restartBtn.addEventListener("click", resetGame);

    resetGame();
    setInterval(tick, speedMs);
  </script>
</body>
</html>
